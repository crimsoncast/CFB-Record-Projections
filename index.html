<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FBS Season Board</title>
<meta name="description" content="Project every FBS win and loss, and watch conference standings recalculate.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --field:#0E1A1F;
  --panel:#16262C;
  --panel-2:#1B2E35;
  --line:#263D46;
  --chalk:#E8EDE9;
  --dim:#7C9199;
  --lamp:#FFB020;
  --lamp-dim:#5A4620;
  --final:#6FA8A0;
  --flag:#E2725B;
  --r:3px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--field);
  color:var(--chalk);
  font-family:'Barlow',system-ui,-apple-system,sans-serif;
  font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3{font-family:'Barlow Condensed','Barlow Narrow',system-ui,sans-serif;font-weight:600;letter-spacing:.02em}
.mono{font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;font-size:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font-family:inherit;font-size:inherit}
a{color:var(--lamp)}
code{font-family:'IBM Plex Mono',monospace;font-size:.9em;background:#0A1418;padding:2px 6px;border-radius:2px;color:var(--lamp)}

.masthead{
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#12222850,transparent);
  padding:14px 20px 12px;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;
}
.wordmark{display:flex;align-items:baseline;gap:10px;margin-right:auto}
.wordmark h1{margin:0;font-size:28px;line-height:1;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.wordmark .yr{color:var(--lamp);font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600}
.tally{display:flex;gap:18px;align-items:flex-end}
.tally div{text-align:right}
.tally .n{font-family:'IBM Plex Mono',monospace;font-size:20px;line-height:1;font-weight:600}
.tally .k{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim)}

.controls{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  padding:10px 20px;border-bottom:1px solid var(--line);background:var(--panel);
}
.ctl{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--r);padding:6px 10px;color:var(--chalk)}
.ctl:focus-visible,button:focus-visible{outline:2px solid var(--lamp);outline-offset:2px}
.btn{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--r);padding:6px 12px;
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:14px}
.btn:hover{border-color:var(--lamp);color:var(--lamp)}
.spacer{flex:1}
.asof{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}

.tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--line);background:var(--panel)}
.tab{padding:10px 18px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  letter-spacing:.1em;font-size:15px;color:var(--dim);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--chalk)}
.tab[aria-selected="true"]{color:var(--lamp);border-bottom-color:var(--lamp)}

main{padding:20px;max-width:1400px}
.pane[hidden]{display:none}
.empty{border:1px dashed var(--line);border-radius:var(--r);padding:28px;max-width:660px;color:var(--dim)}
.empty h2{margin:0 0 8px;color:var(--chalk);font-size:20px;text-transform:uppercase;letter-spacing:.06em}
.empty ol{padding-left:18px;margin:12px 0 0}
.empty li{margin-bottom:8px}
.empty.err{border-color:var(--flag)}
.empty.err h2{color:var(--flag)}

.week{margin-bottom:26px}
.week-hd{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--line)}
.week-hd .n{font-family:'IBM Plex Mono',monospace;color:var(--lamp);font-size:13px;font-weight:600}
.week-hd .t{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.14em;font-size:13px;color:var(--dim)}
.game{display:grid;grid-template-columns:1fr 22px 1fr 74px;gap:6px;align-items:stretch;border-bottom:1px solid #1E3138}
.side{display:flex;align-items:center;gap:8px;padding:7px 10px;width:100%;text-align:left;
  border:1px solid transparent;border-radius:var(--r);color:var(--dim);
  transition:background .12s ease,color .12s ease}
.side.away{justify-content:flex-end;text-align:right;flex-direction:row-reverse}
.side:hover{background:#1E333A;color:var(--chalk)}
.side .nm{font-family:'Barlow Condensed',sans-serif;font-size:17px;line-height:1.15}
.side .cf{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);opacity:.7}
.side.win{background:var(--lamp-dim);color:var(--lamp);box-shadow:inset 0 0 0 1px #FFB02055}
.side.win .nm{font-weight:600}
.side.lose{opacity:.35}
.side.win.final{background:#1F3B38;color:var(--final);box-shadow:inset 0 0 0 1px #6FA8A055}
.at{display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim);opacity:.5}
.mark{display:flex;align-items:center;justify-content:flex-end;padding-right:4px;gap:6px}
.pip{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim)}
.pip.f{color:var(--final)}
.nonfbs{opacity:.55}

table{border-collapse:collapse;width:100%;max-width:820px}
th,td{text-align:left;padding:5px 10px;border-bottom:1px solid #1E3138}
th{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.12em;
  font-size:12px;color:var(--dim);font-weight:500;border-bottom-color:var(--line)}
td.num,th.num{text-align:right;font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
tbody tr:hover{background:#1A2C33}
.pos{color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:12px;width:34px}
.tm{font-family:'Barlow Condensed',sans-serif;font-size:17px}
.berth td{background:#1B2E2B}
.berth .pos{color:var(--final)}

.conf-block{margin-bottom:30px}
.conf-hd{display:flex;align-items:baseline;gap:12px;margin-bottom:6px}
.conf-hd h2{margin:0;font-size:21px;text-transform:uppercase;letter-spacing:.06em}
.conf-hd .meta{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim)}

.tie{border-left:2px solid var(--flag);background:#2A1D1A66;padding:8px 12px;margin:6px 0 10px;max-width:820px;font-size:13px}
.tie .lbl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.12em;
  font-size:12px;color:var(--flag);display:block;margin-bottom:3px}
.tie .h2h{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--chalk);margin:2px 0}
.tie .note{color:var(--dim);font-size:12px;margin-top:5px}

.hint{color:var(--dim);font-size:13px;max-width:660px;margin:0 0 16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--panel-2);border:1px solid var(--lamp);color:var(--lamp);
  padding:9px 18px;border-radius:var(--r);font-size:14px;z-index:50}
.toast[hidden]{display:none}

@media (max-width:720px){
  .game{grid-template-columns:1fr 20px 1fr}
  .mark{grid-column:1/-1;justify-content:flex-start;padding:0 10px 5px}
  main{padding:14px}
  .masthead,.controls,.tabs{padding-left:14px;padding-right:14px}
  .tally{width:100%;justify-content:flex-start}
  .tally div{text-align:left}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header class="masthead">
  <div class="wordmark">
    <h1>FBS Season Board</h1>
    <span class="yr mono" id="yrLabel">&mdash;</span>
  </div>
  <div class="tally">
    <div><div class="n" id="tPicked">0</div><div class="k">Picked</div></div>
    <div><div class="n" id="tOpen">0</div><div class="k">Open</div></div>
    <div><div class="n" id="tTeams">0</div><div class="k">Teams</div></div>
  </div>
</header>

<div class="controls">
  <select class="ctl" id="year" aria-label="Season"></select>
  <select class="ctl" id="confFilter" aria-label="Conference"><option value="">All conferences</option></select>
  <input class="ctl" id="teamFilter" type="search" placeholder="Filter by team" size="16" aria-label="Filter by team">
  <span class="asof" id="asof"></span>
  <span class="spacer"></span>
  <button class="btn" id="export">Export picks</button>
  <button class="btn" id="import">Import picks</button>
  <button class="btn" id="clear">Clear picks</button>
</div>

<nav class="tabs" role="tablist">
  <button class="tab" role="tab" aria-selected="true" data-pane="schedule">Schedule</button>
  <button class="tab" role="tab" aria-selected="false" data-pane="standings">Standings</button>
  <button class="tab" role="tab" aria-selected="false" data-pane="teams">Team records</button>
</nav>

<main>
  <section class="pane" id="pane-schedule">
    <div class="empty"><h2>Loading season</h2><p>One moment.</p></div>
  </section>
  <section class="pane" id="pane-standings" hidden></section>
  <section class="pane" id="pane-teams" hidden></section>
</main>

<div class="toast" id="toast" hidden></div>

<script>
(function(){
"use strict";

var LS = { picks: function(y){ return "fbsboard.picks." + y; } };

var S = {
  year: null,
  manifest: null,
  teams: [],
  games: [],
  picks: {},
  fbs: new Set(),
  conf: {},
  generated: null
};

function lsGet(k){ try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e){ return null; } }
function lsSet(k,v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){ toast("Browser storage is blocked, so picks won't persist."); } }

/* ---------------- data loading ---------------- */
function boot(){
  fetch("data/manifest.json", { cache: "no-cache" })
    .then(function(r){
      if (!r.ok) throw new Error("MISSING");
      return r.json();
    })
    .then(function(m){
      S.manifest = m;
      buildYearSelect(m);
      var first = m.seasons && m.seasons.length ? m.seasons[0].year : null;
      if (!first) throw new Error("EMPTY");
      return loadSeason(first);
    })
    .catch(function(e){
      if (e.message === "MISSING" || e.message === "EMPTY") showNoData();
      else showError("Could not read the season data. " + e.message);
    });
}

function loadSeason(year){
  var bust = encodeURIComponent((S.manifest && S.manifest.generated) || "1");
  return fetch("data/season-" + year + ".json?v=" + bust)
    .then(function(r){
      if (!r.ok) throw new Error("Season " + year + " is listed in the manifest, but data/season-" + year + ".json is missing.");
      return r.json();
    })
    .then(function(season){ hydrate(season); });
}

function hydrate(season){
  S.year = season.year;
  S.teams = season.teams || [];
  S.games = season.games || [];
  S.generated = season.generated;
  S.fbs = new Set();
  S.conf = {};
  S.teams.forEach(function(t){
    S.fbs.add(t.school);
    S.conf[t.school] = t.conference || "Independent";
  });
  S.picks = lsGet(LS.picks(S.year)) || {};

  document.getElementById("yrLabel").textContent = S.year;
  document.getElementById("year").value = String(S.year);
  document.getElementById("asof").textContent = S.generated ? "Data as of " + shortDate(S.generated) : "";
  buildConfFilter();
  renderAll();
}

function shortDate(iso){
  var d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString(undefined, { month:"short", day:"numeric", year:"numeric" });
}

function showNoData(){
  document.getElementById("pane-schedule").innerHTML =
    '<div class="empty"><h2>No season data yet</h2>' +
    "<p>The board reads schedules from files in the <code>data/</code> folder. They haven't been generated yet.</p><ol>" +
    '<li>Get a free key at <a href="https://collegefootballdata.com/key" target="_blank" rel="noopener">collegefootballdata.com/key</a>.</li>' +
    "<li>From the project folder, run <code>CFBD_KEY=your_key node scripts/fetch-season.mjs 2024 2025 2026</code></li>" +
    "<li>Commit the generated <code>data/</code> folder and reload this page.</li>" +
    "</ol><p>After the first run, the scheduled GitHub Action keeps the files current on its own.</p></div>";
}

/* ---------------- projection model ---------------- */
function isFinal(g){
  return g.completed && g.homePts !== null && g.awayPts !== null && g.homePts !== g.awayPts;
}
function winnerSide(g){
  if (isFinal(g)) return g.homePts > g.awayPts ? "home" : "away";
  return S.picks[g.id] || null;
}
function setPick(g, side){
  if (isFinal(g)) return;
  if (S.picks[g.id] === side) delete S.picks[g.id];
  else S.picks[g.id] = side;
  lsSet(LS.picks(S.year), S.picks);
  renderAll();
}

/* A game counts toward league records only when both teams are FBS members of
   the same conference that season. The flag alone misreports realignment years. */
function countsAsConference(g){
  if (!g.confGame) return false;
  if (!S.fbs.has(g.home) || !S.fbs.has(g.away)) return false;
  return S.conf[g.home] && S.conf[g.home] === S.conf[g.away];
}

function computeRecords(){
  var rec = {};
  S.fbs.forEach(function(t){
    rec[t] = { team:t, conf:S.conf[t], w:0, l:0, cw:0, cl:0, beat:{}, confOpp:{} };
  });
  S.games.forEach(function(g){
    var side = winnerSide(g);
    if (!side) return;
    var win  = side === "home" ? g.home : g.away;
    var lose = side === "home" ? g.away : g.home;
    if (rec[win])  rec[win].w++;
    if (rec[lose]) rec[lose].l++;
    if (countsAsConference(g) && rec[win] && rec[lose]){
      rec[win].cw++; rec[lose].cl++;
      rec[win].beat[lose] = true;
      rec[win].confOpp[lose] = "W";
      rec[lose].confOpp[win] = "L";
    }
  });
  Object.keys(rec).forEach(function(k){
    var r = rec[k];
    r.pct  = (r.w + r.l) ? r.w / (r.w + r.l) : 0;
    r.cpct = (r.cw + r.cl) ? r.cw / (r.cw + r.cl) : 0;
  });
  return rec;
}

/* ---------------- rendering ---------------- */
function fmtPct(p){ return p.toFixed(3).replace(/^0/, ""); }
function activeConf(){ return document.getElementById("confFilter").value; }
function activeTeam(){ return document.getElementById("teamFilter").value.trim().toLowerCase(); }

function gameVisible(g){
  var c = activeConf(), t = activeTeam();
  if (c && S.conf[g.home] !== c && S.conf[g.away] !== c) return false;
  if (t && g.home.toLowerCase().indexOf(t) < 0 && g.away.toLowerCase().indexOf(t) < 0) return false;
  return true;
}

function renderSchedule(){
  var host = document.getElementById("pane-schedule");
  var list = S.games.filter(gameVisible);
  if (!list.length){
    host.innerHTML = '<div class="empty"><h2>No games match</h2><p>Widen the conference or team filter to see matchups.</p></div>';
    return;
  }
  var weeks = {};
  list.forEach(function(g){ (weeks[g.week] = weeks[g.week] || []).push(g); });

  var html = '<p class="hint">Click a team to project the winner. Click the same team again to clear the pick. ' +
             "Final results are locked and shown in green.</p>";
  Object.keys(weeks).map(Number).sort(function(a,b){ return a-b; }).forEach(function(wk){
    var games = weeks[wk];
    html += '<div class="week"><div class="week-hd"><span class="n">WK ' + String(wk).padStart(2,"0") +
            '</span><span class="t">' + games.length + " games</span></div>";
    games.forEach(function(g){ html += gameRow(g); });
    html += "</div>";
  });
  host.innerHTML = html;

  host.querySelectorAll(".side").forEach(function(btn){
    btn.addEventListener("click", function(){
      var g = S.games.filter(function(x){ return String(x.id) === btn.dataset.game; })[0];
      if (g) setPick(g, btn.dataset.side);
    });
  });
}

function sideCell(g, side){
  var team = side === "home" ? g.home : g.away;
  var w = winnerSide(g);
  var cls = "side " + side;
  if (w === side) cls += " win";
  else if (w) cls += " lose";
  if (isFinal(g)) cls += " final";
  if (!S.fbs.has(team)) cls += " nonfbs";
  var conf = S.fbs.has(team) ? (S.conf[team] || "") : "FCS";
  var tag = isFinal(g) ? "span" : "button";
  return "<" + tag + ' class="' + cls + '" data-game="' + g.id + '" data-side="' + side + '"' +
         (isFinal(g) ? "" : ' type="button"') + ">" +
         '<span class="nm">' + esc(team) + "</span>" +
         '<span class="cf">' + esc(conf) + "</span></" + tag + ">";
}

function gameRow(g){
  var mark = "";
  if (isFinal(g)) mark = '<span class="pip f">' + g.awayPts + "&ndash;" + g.homePts + "</span>";
  else if (countsAsConference(g)) mark = '<span class="pip">CONF</span>';
  return '<div class="game">' + sideCell(g,"away") +
         '<span class="at">' + (g.neutral ? "vs" : "@") + "</span>" +
         sideCell(g,"home") + '<span class="mark">' + mark + "</span></div>";
}

function renderStandings(){
  var host = document.getElementById("pane-standings");
  var rec = computeRecords();
  var byConf = {};
  Object.keys(rec).forEach(function(k){
    var r = rec[k];
    if (!r.conf || r.conf === "Independent") return;
    (byConf[r.conf] = byConf[r.conf] || []).push(r);
  });
  var only = activeConf();
  var names = Object.keys(byConf).sort().filter(function(c){ return !only || c === only; });
  if (!names.length){ host.innerHTML = '<div class="empty"><h2>No conferences to show</h2></div>'; return; }

  var html = '<p class="hint">Sorted by conference win percentage. Teams level on percentage are flagged, ' +
             "and head-to-head results among them are shown &mdash; that's step one of every conference procedure. " +
             "The full tiebreaker engine isn't wired up yet.</p>";

  names.forEach(function(cname){
    var rows = byConf[cname].slice().sort(function(a,b){
      return b.cpct - a.cpct || b.cw - a.cw || b.pct - a.pct || a.team.localeCompare(b.team);
    });
    html += '<div class="conf-block"><div class="conf-hd"><h2>' + esc(cname) + "</h2>" +
            '<span class="meta">' + rows.length + " teams</span></div>" +
            '<table><thead><tr><th class="pos"></th><th>Team</th><th class="num">Conf</th>' +
            '<th class="num">Pct</th><th class="num">Overall</th></tr></thead><tbody>';
    rows.forEach(function(r,i){
      html += '<tr class="' + (i < 2 ? "berth" : "") + '"><td class="pos">' + (i+1) + "</td>" +
              '<td class="tm">' + esc(r.team) + "</td>" +
              '<td class="num">' + r.cw + "&ndash;" + r.cl + "</td>" +
              '<td class="num">' + fmtPct(r.cpct) + "</td>" +
              '<td class="num">' + r.w + "&ndash;" + r.l + "</td></tr>";
    });
    html += "</tbody></table>" + tieFlags(rows) + "</div>";
  });
  host.innerHTML = html;
}

function tieFlags(rows){
  var out = "", i = 0;
  while (i < rows.length){
    var j = i;
    while (j + 1 < rows.length && Math.abs(rows[j+1].cpct - rows[i].cpct) < 1e-9) j++;
    if (j > i && (rows[i].cw + rows[i].cl) > 0){
      var group = rows.slice(i, j+1);
      out += '<div class="tie"><span class="lbl">' +
             (i < 2 ? "Tie affects the title game" : "Tie at position " + (i+1)) + "</span>" +
             "<div>" + group.map(function(r){
               return esc(r.team) + " " + r.cw + "&ndash;" + r.cl;
             }).join(", ") + " &mdash; all at " + fmtPct(group[0].cpct) + " in league play</div>";
      for (var a = 0; a < group.length; a++){
        for (var b = a+1; b < group.length; b++){
          var x = group[a], y = group[b], line;
          if (x.beat[y.team]) line = x.team + " beat " + y.team;
          else if (y.beat[x.team]) line = y.team + " beat " + x.team;
          else line = x.team + " and " + y.team + " did not meet";
          out += '<div class="h2h">' + esc(line) + "</div>";
        }
      }
      out += '<div class="note">Beyond head-to-head, the conference\'s written procedure decides. ' +
             "Several leagues end in a proprietary analytics ranking or a random draw, which no projection can resolve.</div></div>";
    }
    i = j + 1;
  }
  return out;
}

function renderTeams(){
  var host = document.getElementById("pane-teams");
  var rec = computeRecords();
  var only = activeConf(), tf = activeTeam();
  var rows = Object.keys(rec).map(function(k){ return rec[k]; }).filter(function(r){
    if (only && r.conf !== only) return false;
    if (tf && r.team.toLowerCase().indexOf(tf) < 0) return false;
    return true;
  }).sort(function(a,b){ return b.pct - a.pct || b.w - a.w || a.team.localeCompare(b.team); });

  if (!rows.length){ host.innerHTML = '<div class="empty"><h2>No teams match</h2></div>'; return; }

  var html = '<p class="hint">Every FBS team, projected. Overall records include non-conference and FCS games; league records don\'t.</p>' +
             '<table><thead><tr><th class="pos"></th><th>Team</th><th>Conference</th>' +
             '<th class="num">Overall</th><th class="num">Conf</th><th class="num">Pct</th></tr></thead><tbody>';
  rows.forEach(function(r,i){
    html += '<tr><td class="pos">' + (i+1) + '</td><td class="tm">' + esc(r.team) + "</td>" +
            "<td>" + esc(r.conf || "") + "</td>" +
            '<td class="num">' + r.w + "&ndash;" + r.l + "</td>" +
            '<td class="num">' + r.cw + "&ndash;" + r.cl + "</td>" +
            '<td class="num">' + fmtPct(r.pct) + "</td></tr>";
  });
  host.innerHTML = html + "</tbody></table>";
}

function renderTally(){
  var open = 0, picked = 0;
  S.games.forEach(function(g){
    if (isFinal(g) || S.picks[g.id]) picked++;
    else open++;
  });
  document.getElementById("tPicked").textContent = picked;
  document.getElementById("tOpen").textContent = open;
  document.getElementById("tTeams").textContent = S.fbs.size;
}

function renderAll(){
  if (!S.games.length) return;
  renderTally();
  var pane = currentPane();
  if (pane === "schedule") renderSchedule();
  if (pane === "standings") renderStandings();
  if (pane === "teams") renderTeams();
}

/* ---------------- chrome ---------------- */
function esc(s){
  return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}
function currentPane(){
  var t = document.querySelector('.tab[aria-selected="true"]');
  return t ? t.dataset.pane : "schedule";
}
function showError(msg){
  document.getElementById("pane-schedule").innerHTML =
    '<div class="empty err"><h2>Something went wrong</h2><p>' + esc(msg) + "</p></div>";
}
var toastTimer = null;
function toast(msg){
  var el = document.getElementById("toast");
  el.textContent = msg; el.hidden = false;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.hidden = true; }, 3200);
}
function buildYearSelect(m){
  var sel = document.getElementById("year");
  sel.innerHTML = m.seasons.map(function(s){
    return '<option value="' + s.year + '">' + s.year + "</option>";
  }).join("");
}
function buildConfFilter(){
  var sel = document.getElementById("confFilter");
  var confs = {};
  S.teams.forEach(function(t){ if (t.conference) confs[t.conference] = 1; });
  var keep = sel.value;
  sel.innerHTML = '<option value="">All conferences</option>' +
    Object.keys(confs).sort().map(function(c){ return "<option>" + esc(c) + "</option>"; }).join("");
  if (confs[keep]) sel.value = keep;
}
function debounce(fn, ms){ var t; return function(){ clearTimeout(t); t = setTimeout(fn, ms); }; }

/* ---------------- wiring ---------------- */
document.getElementById("year").addEventListener("change", function(){
  loadSeason(parseInt(this.value, 10)).catch(function(e){ showError(e.message); });
});
document.getElementById("confFilter").addEventListener("change", renderAll);
document.getElementById("teamFilter").addEventListener("input", debounce(renderAll, 180));

document.querySelectorAll(".tab").forEach(function(tab){
  tab.addEventListener("click", function(){
    document.querySelectorAll(".tab").forEach(function(t){ t.setAttribute("aria-selected","false"); });
    tab.setAttribute("aria-selected","true");
    document.querySelectorAll(".pane").forEach(function(p){ p.hidden = true; });
    document.getElementById("pane-" + tab.dataset.pane).hidden = false;
    renderAll();
  });
});

document.getElementById("clear").addEventListener("click", function(){
  if (!confirm("Clear every projected pick for " + S.year + "? Final results stay.")) return;
  S.picks = {};
  lsSet(LS.picks(S.year), S.picks);
  renderAll();
  toast("Picks cleared.");
});

document.getElementById("export").addEventListener("click", function(){
  var blob = new Blob([JSON.stringify({ year:S.year, picks:S.picks }, null, 2)], { type:"application/json" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "fbs-picks-" + S.year + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById("import").addEventListener("click", function(){
  var inp = document.createElement("input");
  inp.type = "file"; inp.accept = "application/json";
  inp.addEventListener("change", function(){
    var f = inp.files[0]; if (!f) return;
    var fr = new FileReader();
    fr.onload = function(){
      try {
        var d = JSON.parse(fr.result);
        if (!d.picks) throw new Error("no picks");
        if (d.year && d.year !== S.year){ toast("That file is for " + d.year + ". Switch seasons first."); return; }
        S.picks = d.picks;
        lsSet(LS.picks(S.year), S.picks);
        renderAll();
        toast("Imported " + Object.keys(d.picks).length + " picks.");
      } catch(e){ toast("That file isn't a picks export."); }
    };
    fr.readAsText(f);
  });
  inp.click();
});

boot();
})();
</script>
</body>
</html>
